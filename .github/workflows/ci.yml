name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install server dependencies
        run: python -m pip install -e "server[dev]"

      - name: Lint server
        run: python -m ruff check server

      - name: Test server
        run: python -m pytest server/tests

  console:
    name: Console
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install console dependencies
        working-directory: console
        run: npm ci

      - name: Build console
        working-directory: console
        run: npm run build

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f deploy/docker-compose.yml config

      - name: Build OpenSandbox Plus image
        run: docker compose -f deploy/docker-compose.yml build opensandbox-plus
